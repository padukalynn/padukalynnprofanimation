<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>— 𝑷‌𝒂‌𝒅‌𝒖‌𝒌‌á𝑳‌𝒚‌𝒏‌ñ🥇🆙 Profile</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        /* --- OPENING FOTO --- */
        #opening {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        .opening-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .container {
            width: 100%;
            max-width: 450px; 
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            position: relative;
            overflow-y: auto;
            scrollbar-width: none;
            padding-top: 0; 
            border-left: 1px solid rgba(0, 255, 255, 0.2);
            border-right: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .container::-webkit-scrollbar {
            display: none;
        }

        /* --- CLOCK STYLING --- */
        .clock-container {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            z-index: 10;
            pointer-events: none;
        }

        .analog-clock {
            width: 50px;
            height: 50px;
            border: 2px solid #00ffff;
            border-radius: 50%;
            position: relative;
            background: rgba(0, 0, 0, 0.5);
            margin-bottom: 5px;
        }

        .analog-clock .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            background: #00ffff;
            border-radius: 2px;
        }

        .hour-hand { width: 2px; height: 12px; z-index: 3; }
        .min-hand { width: 2px; height: 18px; z-index: 2; }
        .sec-hand { width: 1px; height: 20px; background: #ff0000 !important; z-index: 1; }

        .digital-clock {
            font-size: 12px;
            color: #00ffff;
            font-weight: bold;
            text-shadow: 0 0 5px #00ffff;
        }

        /* --- FOTO SAMPUL --- */
        .cover-photo {
            width: 100%;
            height: 250px;
            background-image: url('https://i.postimg.cc/QxsHxKyH/Proyek-Baru-1-925B912.png');
            background-size: cover;
            background-position: center;
            border-bottom: 3px solid #00ffff;
        }

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -60px;
            padding: 20px;
            padding-bottom: 50px;
        }

        /* PERUBAHAN DISINI: Glow Biru Cyan Neon */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00ffff;
            box-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff, inset 0 0 10px #00ffff;
            background-color: #000;
            margin-bottom: 15px;
            animation: cyanNeonGlow 2s infinite alternate;
        }

        #current-date {
            font-size: 11px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2px;
        }

        .name {
            font-size: 22px;
            font-weight: 700;
            color: #00ffff; 
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            text-align: center;
        }

        /* PERUBAHAN DISINI: Glow pada Game Info */
        .game-info {
            text-align: center;
            margin-top: 20px;
            background: rgba(0, 255, 255, 0.08);
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
            width: 90%;
        }

        .game-info p {
            margin: 5px 0;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.6);
        }

        .game-info strong {
            color: #00ffff;
        }

        .wa-button {
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: #00ffff;
            border: 2px solid #00ffff;
            padding: 15px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            width: 80%;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .wa-button:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 20px #00ffff;
        }

        /* ANIMASI NEON */
        @keyframes cyanNeonGlow {
            0% {
                box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
                border-color: #00ffff;
            }
            100% {
                box-shadow: 0 0 25px #00ffff, 0 0 45px #00ffff, inset 0 0 10px #fff;
                border-color: #fff;
            }
        }

        /* --- TOMBOL GALERI --- */
        .gallery-trigger {
            position: fixed;
            bottom: 30px;
            left: 20px;
            width: 65px;
            height: 65px;
            border: 2px solid #00ffff;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            z-index: 999;
            background: #000;
            transition: transform 0.3s ease, opacity 0.5s ease;
        }

        .gallery-trigger img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- OVERLAY GALERI --- */
        #gallery-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease, visibility 0.6s ease;
            backdrop-filter: blur(15px);
            padding-top: 40px;
        }

        #gallery-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 400px;
            padding-bottom: 80px;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .grid-container::-webkit-scrollbar { display: none; }

        .gallery-item {
            aspect-ratio: 9 / 16;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #00ffff;
            background: #111;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="opening">
        <img src="https://i.postimg.cc/J0bWGWq4/Proyek-Baru-8-05D47A8.png" alt="Opening" class="opening-img">
    </div>

    <video autoplay muted loop playsinline class="video-bg">
        <source src="https://res.cloudinary.com/drxy2exhs/video/upload/950bb6c7b0ca008ce036d52ace1349ef_720w_lboyde.mp4" type="video/mp4">
    </video>

    <div class="container" id="main-container">
        <div class="clock-container">
            <div class="analog-clock">
                <div class="hand hour-hand" id="hour-h"></div>
                <div class="hand min-hand" id="min-h"></div>
                <div class="hand sec-hand" id="sec-h"></div>
            </div>
            <div class="digital-clock" id="digital-clock">00:00:00</div>
        </div>

        <div class="cover-photo"></div>

        <div class="profile-section">
            <img src="https://i.postimg.cc/PxxJdf8V/IMG-20260407-110835.jpg" alt="Profile" class="profile-img">
            
            <div id="current-date">SABTU, 01 JANUARI 2024</div>
            <h1 class="name">— 𝑷‌𝒂‌𝒅‌𝒖‌𝒌‌á𝑳‌𝒚‌𝒏‌ñ🥇🆙</h1>
            
            <p style="font-size: 13px; opacity: 0.8; margin-bottom: 10px;">🇯🇵 Suginami, Tokyo, Japan</p>

            <div class="game-info">
                <p><strong>Game Name:</strong> RománticLynñ</p>
                <p><strong>Game ID:</strong> 3246866473</p>
            </div>

            <a href="https://wa.me/6289652127945" class="wa-button" target="_blank">
                Chat via WhatsApp
            </a>

            <p style="margin-top: 40px; font-size: 10px; color: rgba(255, 255, 255, 0.4);">© 2026 PadukaLynñ. All Rights Reserved.</p>
        </div>
    </div>

    <div class="gallery-trigger" id="gallery-btn" onclick="toggleGallery(true)">
        <img src="https://i.postimg.cc/PxxJdf8V/IMG-20260407-110835.jpg" alt="Open Gallery">
    </div>

    <div id="gallery-overlay">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 style="color: #00ffff; letter-spacing: 5px; text-shadow: 0 0 10px #00ffff;">GALERI</h2>
            <button onclick="toggleGallery(false)" style="background:none; border:1px solid #00ffff; color:#00ffff; padding:8px 25px; border-radius:20px; margin-top:10px; cursor:pointer; font-weight: bold; text-transform: uppercase;">Tutup</button>
        </div>
        
        <div class="grid-container">
            <div class="gallery-item"><img src="https://via.placeholder.com/1080x1920/000000/00ffff?text=9:16+Foto+1" alt="1"></div>
            <div class="gallery-item"><img src="https://via.placeholder.com/1080x1920/000000/00ffff?text=9:16+Foto+2" alt="2"></div>
            <div class="gallery-item"><img src="https://via.placeholder.com/1080x1920/000000/00ffff?text=9:16+Foto+3" alt="3"></div>
            <div class="gallery-item"><img src="https://via.placeholder.com/1080x1920/000000/00ffff?text=9:16+Foto+4" alt="4"></div>
        </div>
    </div>

    <script>
        // Opening logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                const opening = document.getElementById('opening');
                opening.style.opacity = '0';
                setTimeout(() => opening.style.display = 'none', 1000);
            }, 2500);
        });

        // Gallery Toggle
        function toggleGallery(show) {
            const overlay = document.getElementById('gallery-overlay');
            const main = document.getElementById('main-container');
            const trigger = document.getElementById('gallery-btn');
            
            if (show) {
                overlay.classList.add('active');
                main.style.filter = 'blur(10px) grayscale(50%)';
                trigger.style.opacity = '0';
                trigger.style.pointerEvents = 'none';
            } else {
                overlay.classList.remove('active');
                main.style.filter = 'none';
                trigger.style.opacity = '1';
                trigger.style.pointerEvents = 'auto';
            }
        }

        // Clock Update
        function updateClock() {
            const now = new Date();
            const sec = now.getSeconds(), min = now.getMinutes(), hr = now.getHours();
            
            document.getElementById('sec-h').style.transform = `translateX(-50%) rotate(${(sec/60)*360}deg)`;
            document.getElementById('min-h').style.transform = `translateX(-50%) rotate(${(min/60)*360}deg)`;
            document.getElementById('hour-h').style.transform = `translateX(-50%) rotate(${(hr/12)*360 + (min/60)*30}deg)`;
            
            document.getElementById('digital-clock').innerText = 
                `${String(hr).padStart(2,'0')}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

            const days = ['MINGGU', 'SENIN', 'SELASA', 'RABU', 'KAMIS', 'JUMAT', 'SABTU'];
            const months = ['JANUARI', 'FEBRUARI', 'MARET', 'APRIL', 'MEI', 'JUNI', 'JULI', 'AGUSTUS', 'SEPTEMBER', 'OKTOBER', 'NOVEMBER', 'DESEMBER'];
            document.getElementById('current-date').innerText = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
