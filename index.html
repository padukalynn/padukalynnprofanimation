<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>— 𝑷‌𝒂‌𝒅‌𝒖‌𝒌‌á𝑳‌𝒚‌𝒏‌ñ🥇🆙 Profile</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        /* --- OPENING FOTO --- */
        #opening {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        .opening-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Background Video Utama */
        .video-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .container {
            width: 100%;
            max-width: 400px; 
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            position: relative;
            overflow-y: auto;
            border-left: 1px solid rgba(0, 255, 255, 0.2);
            border-right: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            transition: transform 0.5s ease, opacity 0.5s ease;
        }

        /* --- CLOCK STYLING --- */
        .clock-container {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            z-index: 10;
        }

        .analog-clock {
            width: 50px;
            height: 50px;
            border: 2px solid #00ffff;
            border-radius: 50%;
            position: relative;
            background: rgba(0, 0, 0, 0.5);
            margin-bottom: 5px;
        }

        .analog-clock .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            background: #00ffff;
            border-radius: 2px;
        }

        .hour-hand { width: 2px; height: 12px; z-index: 3; }
        .min-hand { width: 2px; height: 18px; z-index: 2; }
        .sec-hand { width: 1px; height: 20px; background: #ff0000 !important; z-index: 1; }

        .digital-clock {
            font-size: 12px;
            color: #00ffff;
            font-weight: bold;
            text-shadow: 0 0 5px #00ffff;
        }

        .cover-photo {
            width: 100%;
            height: 250px;
            background-image: url('https://i.postimg.cc/QxsHxKyH/Proyek-Baru-1-925B912.png');
            background-size: cover;
            background-position: center;
            border-bottom: 3px solid #00ffff;
        }

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -60px;
            padding: 20px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #00ffff;
            box-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff;
            background-color: #000;
            margin-bottom: 15px;
            animation: glow 2s infinite;
        }

        #current-date {
            font-size: 11px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2px;
            opacity: 0.8;
        }

        .name {
            font-size: 22px;
            font-weight: 700;
            color: #00ffff; 
            text-shadow: 0 0 10px #00ffff;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .game-info {
            text-align: center;
            margin-bottom: 25px;
            background: rgba(0, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            width: 90%;
        }

        .game-info p {
            font-size: 14px;
            color: #00ffff;
            margin: 5px 0;
            letter-spacing: 1px;
        }

        .location {
            font-size: 13px;
            color: #fff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0.9;
        }

        .wa-button {
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: #00ffff;
            border: 2px solid #00ffff;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            width: 80%;
        }

        .wa-button:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 20px #00ffff;
        }

                /* --- KOTAK PEMICU GALERI (Tetap di pojok kiri bawah layar) --- */
        .gallery-trigger {
            position: fixed; /* Diubah dari absolute ke fixed */
            bottom: 20px;
            left: 20px;
            width: 65px;
            height: 65px;
            border: 2px solid #00ffff;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            transition: all 0.3s ease;
            z-index: 999; /* Memastikan di atas konten lain */
            background: #000;
        }

        .gallery-trigger:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px #00ffff;
        }

        .gallery-trigger img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }


        /* --- OVERLAY GALERI --- */
        #gallery-overlay {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            transition: transform 0.5s ease;
            padding: 20px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }

        #gallery-overlay.active {
            transform: translateX(-50%) translateY(0);
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .gallery-header h2 {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            letter-spacing: 3px;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .back-btn {
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding-bottom: 40px;
        }

        .gallery-item {
            aspect-ratio: 9/16;
            background: #111;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .gallery-item img:hover {
            transform: scale(1.1);
        }

        @keyframes glow {
            0% { box-shadow: 0 0 5px #00ffff; }
            50% { box-shadow: 0 0 20px #00ffff, 0 0 30px #008080; }
            100% { box-shadow: 0 0 5px #00ffff; }
        }
    </style>
</head>
<body>

    <div id="opening">
        <img src="https://i.postimg.cc/J0bWGWq4/Proyek-Baru-8-05D47A8.png" alt="Opening" class="opening-img">
    </div>

    <video autoplay muted loop playsinline class="video-bg">
        <source src="https://res.cloudinary.com/drxy2exhs/video/upload/950bb6c7b0ca008ce036d52ace1349ef_720w_lboyde.mp4" type="video/mp4">
    </video>

    <div class="container" id="main-container">
        <div class="clock-container">
            <div class="analog-clock">
                <div class="hand hour-hand" id="hour-h"></div>
                <div class="hand min-hand" id="min-h"></div>
                <div class="hand sec-hand" id="sec-h"></div>
            </div>
            <div class="digital-clock" id="digital-clock">00:00:00</div>
        </div>

        <div class="cover-photo"></div>

        <div class="profile-section">
            <img src="https://i.postimg.cc/PxxJdf8V/IMG-20260407-110835.jpg" alt="Profile" class="profile-img">
            
            <div id="current-date">SABTU, 01 JANUARI 2024</div>
            <h1 class="name">— 𝑷‌𝒂‌𝒅‌𝒖‌𝒌‌á𝑳‌𝒚‌𝒏‌ñ🥇🆙</h1>
            
            <div class="location">
                <span>🇯🇵</span> Suginami, Tokyo, Japan
            </div>

            <div class="game-info">
                <p><strong>Game Name:</strong> RománticLynñ</p>
                <p><strong>Game ID:</strong> 3246866473</p>
            </div>

            <a href="https://wa.me/6289652127945" class="wa-button" target="_blank">
                <span>Chat via WhatsApp</span>
            </a>
            
            <p style="margin-top: 15px; font-size: 12px; color: rgba(0, 255, 255, 0.6);">089652127945</p>
        </div>

        <div class="gallery-trigger" onclick="toggleGallery(true)">
            <img src="https://i.postimg.cc/PxxJdf8V/IMG-20260407-110835.jpg" alt="Open Gallery">
        </div>
    </div>

    <div id="gallery-overlay">
        <div class="gallery-header">
            <h2>GALERI PADUKA</h2>
            <button class="back-btn" onclick="toggleGallery(false)">← Kembali</button>
        </div>
        
        <div class="grid-container">
            <div class="gallery-item"><img src="https://via.placeholder.com/1080x1920/111/00ffff?text=Foto+1" alt="1"></div>
            <div class="gallery-item"><img src="https://via.placeholder.com/1080x1920/111/00ffff?text=Foto+2" alt="2"></div>
            <div class="gallery-item"><img src="https://via.placeholder.com/1080x1920/111/00ffff?text=Foto+3" alt="3"></div>
            <div class="gallery-item"><img src="https://via.placeholder.com/1080x1920/111/00ffff?text=Foto+4" alt="4"></div>
            <div class="gallery-item"><img src="https://via.placeholder.com/1080x1920/111/00ffff?text=Foto+5" alt="5"></div>
            <div class="gallery-item"><img src="https://via.placeholder.com/1080x1920/111/00ffff?text=Foto+6" alt="6"></div>
        </div>
    </div>

    <script>
        // Opening Animation
        window.addEventListener('load', () => {
            const opening = document.getElementById('opening');
            setTimeout(() => {
                opening.style.opacity = '0';
                setTimeout(() => {
                    opening.style.display = 'none';
                }, 1000);
            }, 3000);
        });

        // Gallery Toggle Function
        function toggleGallery(show) {
            const overlay = document.getElementById('gallery-overlay');
            const main = document.getElementById('main-container');
            
            if (show) {
                overlay.classList.add('active');
                main.style.opacity = '0';
                main.style.transform = 'scale(0.9)';
            } else {
                overlay.classList.remove('active');
                main.style.opacity = '1';
                main.style.transform = 'scale(1)';
            }
        }

        // Time and Date Function
        function updateClock() {
            const now = new Date();
            
            const seconds = now.getSeconds();
            const minutes = now.getMinutes();
            const hours = now.getHours();

            const secDeg = (seconds / 60) * 360;
            const minDeg = (minutes / 60) * 360 + (seconds / 60) * 6;
            const hourDeg = (hours / 12) * 360 + (minutes / 60) * 30;

            document.getElementById('sec-h').style.transform = `translateX(-50%) rotate(${secDeg}deg)`;
            document.getElementById('min-h').style.transform = `translateX(-50%) rotate(${minDeg}deg)`;
            document.getElementById('hour-h').style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;

            const h = String(hours).padStart(2, '0');
            const m = String(minutes).padStart(2, '0');
            const s = String(seconds).padStart(2, '0');
            document.getElementById('digital-clock').innerText = `${h}:${m}:${s}`;

            const days = ['MINGGU', 'SENIN', 'SELASA', 'RABU', 'KAMIS', 'JUMAT', 'SABTU'];
            const months = ['JANUARI', 'FEBRUARI', 'MARET', 'APRIL', 'MEI', 'JUNI', 'JULI', 'AGUSTUS', 'SEPTEMBER', 'OKTOBER', 'NOVEMBER', 'DESEMBER'];
            
            document.getElementById('current-date').innerText = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
