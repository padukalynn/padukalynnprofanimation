<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>— 𝑷‌𝒂‌𝒅‌𝒖‌𝒌‌á𝑳‌𝒚‌𝒏‌ñ🥇🆙 Profile</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        /* --- OPENING FOTO --- */
        #opening {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        .opening-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        /* --- CONTAINER UTAMA --- */
        .container {
            width: 100%;
            max-width: 450px; 
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            position: relative;
            overflow-y: auto;
            scrollbar-width: none;
            border-left: 1px solid rgba(0, 255, 255, 0.2);
            border-right: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            margin: 0 auto;
        }

        .container::-webkit-scrollbar { display: none; }

        /* --- MUSIC PLAYER --- */
        .music-control {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00ffff;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 10px #00ffff;
            transition: 0.3s;
        }

        .music-control.playing {
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- CLOCK STYLING --- */
        .clock-container {
            position: sticky;
            top: 15px;
            right: 15px;
            float: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            z-index: 10;
            padding-right: 15px;
        }

        .analog-clock {
            width: 45px;
            height: 45px;
            border: 2px solid #00ffff;
            border-radius: 50%;
            position: relative;
            background: rgba(0, 0, 0, 0.5);
        }

        .analog-clock .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            background: #00ffff;
        }

        .hour-hand { width: 2px; height: 10px; }
        .min-hand { width: 2px; height: 15px; }
        .sec-hand { width: 1px; height: 18px; background: #ff0000 !important; }

        /* --- PROFILE --- */
        .cover-photo {
            width: 100%;
            height: 230px;
            background-image: url('https://i.postimg.cc/QxsHxKyH/Proyek-Baru-1-925B912.png');
            background-size: cover;
            background-position: center;
            border-bottom: 3px solid #00ffff;
        }

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -60px;
            padding: 20px;
            padding-bottom: 100px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00ffff;
            box-shadow: 0 0 20px #00ffff;
            background-color: #000;
            margin-bottom: 15px;
            animation: cyanNeonGlow 2s infinite alternate;
        }

        .name {
            font-size: 22px;
            color: #00ffff; 
            text-shadow: 0 0 10px #00ffff;
            text-align: center;
        }

        .game-info {
            text-align: center;
            margin-top: 20px;
            background: rgba(0, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #00ffff;
            width: 90%;
        }

        .wa-button {
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #00ffff;
            color: #00ffff;
            padding: 12px;
            border-radius: 50px;
            text-decoration: none;
            width: 80%;
            font-weight: bold;
            transition: 0.3s;
        }

        .wa-button:hover {
            background: #00ffff;
            color: #000;
        }

        /* --- BUTTERFLY --- */
        .gallery-wrapper {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 999;
        }

        .butterfly {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #00ffff;
            border-radius: 50%;
            filter: blur(2px);
            pointer-events: none;
            opacity: 0;
            animation: fly 4s infinite ease-in-out;
        }

        @keyframes fly {
            0% { transform: translate(0, 0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        .gallery-trigger {
            width: 65px;
            height: 65px;
            border: 2px solid #00ffff;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            background: #000;
            position: relative;
            z-index: 10;
        }

        .gallery-trigger img { width: 100%; height: 100%; object-fit: cover; }

        /* --- GALERI TRANSPARAN (UPDATE) --- */
        #gallery-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Transparan gelap */
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease-in-out;
            backdrop-filter: blur(6px); /* Efek kaca transparan */
            -webkit-backdrop-filter: blur(6px);
            padding-top: 60px;
        }

        #gallery-overlay.active { 
            opacity: 1; 
            visibility: visible; 
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 90%;
            max-width: 400px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 10px;
        }

        .gallery-item { 
            aspect-ratio: 9/16; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1.5px solid rgba(0, 255, 255, 0.5); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        .close-btn {
            margin-top: 30px;
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid #00ffff;
            color: #00ffff;
            padding: 10px 40px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .close-btn:hover {
            background: #00ffff;
            color: #000;
        }

        @keyframes cyanNeonGlow {
            from { box-shadow: 0 0 10px #00ffff; }
            to { box-shadow: 0 0 25px #00ffff, 0 0 5px #fff; }
        }
    </style>
</head>
<body>

    <div class="music-control" id="music-btn" onclick="toggleMusic()">
        <span id="music-icon">🎵</span>
    </div>

    <audio id="myAudio" loop>
        <source src="https://drive.google.com/uc?id=1L0SPdliuQCS9BQq7nrIXEoa4RL0fIHMX" type="audio/mp3">
    </audio>

    <div id="opening">
        <img src="https://ibb.co.com/ynVzLYxQ" alt="Opening" class="opening-img">
    </div>

    <video autoplay muted loop playsinline class="video-bg">
        <source src="https://res.cloudinary.com/drxy2exhs/video/upload/950bb6c7b0ca008ce036d52ace1349ef_720w_lboyde.mp4" type="video/mp4">
    </video>

    <div class="container" id="main-container">
        <div class="clock-container">
            <div class="analog-clock">
                <div class="hand hour-hand" id="hour-h"></div>
                <div class="hand min-hand" id="min-h"></div>
                <div class="hand sec-hand" id="sec-h"></div>
            </div>
            <div class="digital-clock" id="digital-clock" style="font-size: 10px; color: #00ffff;">00:00:00</div>
        </div>

        <div class="cover-photo"></div>

        <div class="profile-section">
            <img src="https://i.postimg.cc/PxxJdf8V/IMG-20260407-110835.jpg" alt="Profile" class="profile-img">
            <div id="current-date" style="font-size: 10px; letter-spacing: 2px;">SABTU, 01 JANUARI 2024</div>
            <h1 class="name">— 𝑷‌𝒂‌𝒅‌𝒖‌𝒌‌á𝑳‌𝒚‌𝒏‌ñ🥇🆙</h1>
            <p style="font-size: 12px; opacity: 0.7; margin: 5px 0;">🇯🇵 Suginami, Tokyo, Japan</p>

            <div class="game-info">
                <p><strong>Game Name:</strong> RománticLynñ</p>
                <p><strong>Game ID:</strong> 3246866473</p>
            </div>

            <a href="https://wa.me/6289652127945" class="wa-button" target="_blank">Chat via WhatsApp</a>
            <p style="margin-top: 30px; font-size: 9px; color: rgba(255, 255, 255, 0.3);">© 2026 PadukaLynñ.</p>
        </div>
    </div>

    <div class="gallery-wrapper">
        <div id="butterfly-container"></div>
        <div class="gallery-trigger" id="gallery-btn" onclick="toggleGallery(true)">
            <img src="https://i.postimg.cc/Z5YvyXYL/IMG-20260407-214744.jpg" alt="Gallery">
        </div>
    </div>

    <div id="gallery-overlay">
        <h2 style="color: #00ffff; margin-bottom: 25px; letter-spacing: 5px; text-shadow: 0 0 10px #00ffff;">GALERI</h2>
        <div class="grid-container">
            <div class="gallery-item"><img src="https://i.postimg.cc/90mdL0tw/d2f75f32837faa3c3280cabe94c80bd2.jpg"></div>
            <div class="gallery-item"><img src="https://i.postimg.cc/Jz5P5wWx/2b98f64a459a6ed9caa0be3fd83b1f5f.jpg"></div>
            <div class="gallery-item"><img src="https://i.postimg.cc/C5MFdpSd/e48eac89085fbe7210a3d448aad1c92e.jpg"></div>
            <div class="gallery-item"><img src="https://i.postimg.cc/15Cpm9PT/ada6b6052175095cb63500cd9d92922f.jpg"></div>
        </div>
        <button class="close-btn" onclick="toggleGallery(false)">TUTUP</button>
    </div>

    <script>
        // Logika Musik
        const audio = document.getElementById('myAudio');
        const btn = document.getElementById('music-btn');
        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                btn.classList.add('playing');
            } else {
                audio.pause();
                btn.classList.remove('playing');
            }
        }

        // Partikel Kupu-kupu
        function createButterflies() {
            const container = document.getElementById('butterfly-container');
            for (let i = 0; i < 8; i++) {
                const b = document.createElement('div');
                b.className = 'butterfly';
                b.style.setProperty('--x', (Math.random() * 100 - 50) + 'px');
                b.style.setProperty('--y', (Math.random() * -100 - 20) + 'px');
                b.style.left = Math.random() * 50 + 'px';
                b.style.animationDelay = Math.random() * 4 + 's';
                container.appendChild(b);
            }
        }
        createButterflies();

        // Logika Opening
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('opening').style.opacity = '0';
                setTimeout(() => document.getElementById('opening').style.display = 'none', 1000);
            }, 2500);
        });

        // Logika Galeri
        function toggleGallery(show) {
            const overlay = document.getElementById('gallery-overlay');
            if(show) {
                overlay.classList.add('active');
            } else {
                overlay.classList.remove('active');
            }
        }

        // Update Jam & Tanggal
        function updateClock() {
            const now = new Date();
            const s = now.getSeconds(), m = now.getMinutes(), h = now.getHours();
            document.getElementById('sec-h').style.transform = `translateX(-50%) rotate(${(s/60)*360}deg)`;
            document.getElementById('min-h').style.transform = `translateX(-50%) rotate(${(m/60)*360}deg)`;
            document.getElementById('hour-h').style.transform = `translateX(-50%) rotate(${(h/12)*360 + (m/60)*30}deg)`;
            document.getElementById('digital-clock').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            
            const days = ['MINGGU', 'SENIN', 'SELASA', 'RABU', 'KAMIS', 'JUMAT', 'SABTU'];
            const months = ['JANUARI', 'FEBRUARI', 'MARET', 'APRIL', 'MEI', 'JUNI', 'JULI', 'AGUSTUS', 'SEPTEMBER', 'OKTOBER', 'NOVEMBER', 'DESEMBER'];
            document.getElementById('current-date').innerText = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
